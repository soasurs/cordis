name: authenticator.v1
listenOn: 0.0.0.0:3001
timeout: 0
health: false

log:
  level: error
  stat: false

devServer:
  enabled: true
  host: 0.0.0.0
  port: 6061
  enableMetrics: true
  enablePprof: false

telemetry:
  endpoint: "${CORDIS_OTEL_ENDPOINT}"
  sampler: 1.0
  batcher: otlpgrpc

middlewares:
  trace: true
  recover: true
  stat: false
  prometheus: true
  breaker: true

database:
  dataSource: postgres://cordis:cordis@127.0.0.1:5432/cordis?sslmode=disable
  maxOpenConns: 10
  maxIdleConns: 5

tokens:
  issuer: cordis.authenticator.v1
  access:
    secret: ${CORDIS_ACCESS_TOKEN_SECRET}
    ttl: 15m
  refresh:
    secret: ${CORDIS_REFRESH_TOKEN_SECRET}
    ttl: 720h

sessions:
  ttl: 720h

password:
  maxConcurrency: 4

registration:
  # open, invite_only, or closed
  mode: open
  reservationTTL: 15m

recovery:
  passwordResetTTL: 30m
  emailVerificationTTL: 24h
  requestIntervalSeconds: 60
  redis:
    host: 127.0.0.1:6379

twoFactor:
  issuer: Cordis
  enrollmentTTL: 10m
  loginChallengeTTL: 5m
  maxAttempts: 5
  recoveryCodeCount: 10
  encryption:
    primaryKeyID: totp-current
    keys:
      - id: totp-current
        secret: ${CORDIS_TOTP_ENCRYPTION_KEY}

services:
  user:
    endpoints:
      - 127.0.0.1:3000
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  mailer:
    endpoints:
      - 127.0.0.1:3007
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
