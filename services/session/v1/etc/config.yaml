name: session.v1
listenOn: 0.0.0.0:3006
timeout: 0

log:
  level: error
  stat: false

devServer:
  enabled: true
  host: 0.0.0.0
  port: 6067
  enableMetrics: true
  enablePprof: false

telemetry:
  endpoint: "${CORDIS_OTEL_ENDPOINT}"
  sampler: 1.0
  batcher: otlpgrpc

middlewares:
  trace: true
  recover: true
  stat: false
  prometheus: true
  breaker: true

redis:
  host: 127.0.0.1:6379
  type: node

sessionRegistry:
  hosts:
    - 127.0.0.1:2379
  prefix: /cordis/session/nodes
  dialTimeoutSeconds: 5

node:
  id: session-local
  advertiseAddress: 127.0.0.1:3006
  heartbeatSeconds: 15
  nodeTTLSeconds: 30
  sessionResumeSeconds: 120
  maxReplayEvents: 2048
  routeRefreshSeconds: 15
  routeTTLSeconds: 30
  bindingQueueSize: 4096
  drainSeconds: 30
  maxSubscribedChannels: 500
  maxVisibilityGuilds: 100
  maxVisibilityChannels: 500
  maxPresenceUpdates: 5
  presenceWindowSeconds: 20

rateLimit:
  keyPrefix: "cordis:session:rate_limit:"
  fallbackMaxKeys: 10000
  fallbackRetryInterval: 1s
  policies:
    identify_user:
      limit: 20
      window: 5m
    identify_auth_session:
      limit: 5
      window: 5m
    presence_user:
      limit: 10
      window: 20s

services:
  authenticator:
    endpoints:
      - 127.0.0.1:3001
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  presence:
    endpoints:
      - 127.0.0.1:3003
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  guild:
    endpoints:
      - 127.0.0.1:3005
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
