}

message CreateGuildChannelRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  string name = 3;
  GuildChannelType type = 4;
  string topic = 5;
  int64 parent_id = 6;
}

message CreateGuildChannelResponse {
  GuildChannel channel = 1;
}

message GetGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message GetGuildChannelResponse {
  GuildChannel channel = 1;
}

message ListGuildChannelsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildChannelsResponse {
  repeated GuildChannel channels = 1;
}

message UpdateGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  // Optional replacement fields.
  string name = 3;
  string topic = 4;
  int64 parent_id = 5;
}

message UpdateGuildChannelResponse {
  GuildChannel channel = 1;
}

message DeleteGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message DeleteGuildChannelResponse {
  bool ok = 1;
}

message GuildChannelPosition {
  int64 channel_id = 1;
  int32 position = 2;
}

message ReorderGuildChannelsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  repeated GuildChannelPosition positions = 3;
}

message ReorderGuildChannelsResponse {
  repeated GuildChannel channels = 1;
}

message UpsertGuildChannelPermissionOverwriteRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
  uint64 allow = 5;
  uint64 deny = 6;
}

message UpsertGuildChannelPermissionOverwriteResponse {
  GuildChannelPermissionOverwrite overwrite = 1;
}

message DeleteGuildChannelPermissionOverwriteRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
}

message DeleteGuildChannelPermissionOverwriteResponse {
  bool ok = 1;
}

message ListGuildChannelPermissionOverwritesRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildChannelPermissionOverwritesResponse {
  repeated GuildChannelPermissionOverwrite overwrites = 1;
}

message AuthorizeGuildChannelRequest {
  int64 channel_id = 1;
  int64 user_id = 2;
  uint64 permission = 3;
}

message AuthorizeGuildChannelResponse {
  bool allowed = 1;
  int64 guild_id = 2;
  uint64 permissions = 3;
  GuildChannelType channel_type = 4;
}
