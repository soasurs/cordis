edition = "2023";

package presence.v1;

// PresenceService tracks per-device user presence and aggregate status.
service PresenceService {
  // RegisterUserSession records one logical Session device for a user.
  // Session calls this after IDENTIFY authenticates the user.
  rpc RegisterUserSession(RegisterUserSessionRequest) returns (RegisterUserSessionResponse);

  // RefreshUserSession renews a logical Session lease and may update client
  // state such as foreground/background.
  rpc RefreshUserSession(RefreshUserSessionRequest) returns (RefreshUserSessionResponse);

  // RefreshUserSessions renews existing logical Session leases in one batch.
  // Missing leases are returned so Session can register them through the
  // transition-aware single-session path.
  rpc RefreshUserSessions(RefreshUserSessionsRequest) returns (RefreshUserSessionsResponse);

  // UpdateUserPresence updates a websocket session's visible presence state.
  rpc UpdateUserPresence(UpdateUserPresenceRequest) returns (UpdateUserPresenceResponse);

  // RemoveUserSession removes a logical Session when its resume window ends.
  // Sessions lost with their node are cleaned up by TTL.
  rpc RemoveUserSession(RemoveUserSessionRequest) returns (RemoveUserSessionResponse);

  // ResolveUsersPresence returns aggregated live presence for the requested
  // users. Membership and channel visibility remain owned by the channel
  // service, not presence.
  rpc ResolveUsersPresence(ResolveUsersPresenceRequest) returns (ResolveUsersPresenceResponse);
}

enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  PRESENCE_STATUS_OFFLINE = 1;
  PRESENCE_STATUS_ONLINE = 2;
  PRESENCE_STATUS_IDLE = 3;
  PRESENCE_STATUS_DND = 4;
  PRESENCE_STATUS_INVISIBLE = 5;
}

enum ClientState {
  CLIENT_STATE_UNSPECIFIED = 0;
  CLIENT_STATE_FOREGROUND = 1;
  CLIENT_STATE_BACKGROUND = 2;
}

message UserSession {
  int64 user_id = 1;
  string session_id = 2;
  string gateway_id = 3;
  string generation = 4;
  string device_type = 5;
  PresenceStatus status = 6;
  ClientState client_state = 7;
  int64 last_seen_at = 8;
  int64 expires_at = 9;
}

message UserPresence {
  int64 user_id = 1;
  PresenceStatus status = 2;
  int64 last_seen_at = 3;
  repeated UserSession sessions = 4;
}

message RegisterUserSessionRequest {
  int64 user_id = 1;
  string session_id = 2;
  string gateway_id = 3;
  string generation = 4;
  string device_type = 5;
  PresenceStatus status = 6;
  ClientState client_state = 7;
  // Guild memberships captured by the calling session node; presence
  // transition events fan out through these guild routes.
  repeated int64 guild_ids = 8;
}

message RegisterUserSessionResponse {
  UserPresence presence = 1;
}

message RefreshUserSessionRequest {
  int64 user_id = 1;
  string session_id = 2;
  string gateway_id = 3;
  string generation = 4;
  string device_type = 5;
  PresenceStatus status = 6;
  ClientState client_state = 7;
  // Guild memberships captured by the calling session node; presence
  // transition events fan out through these guild routes.
  repeated int64 guild_ids = 8;
}

message RefreshUserSessionResponse {
  UserPresence presence = 1;
}

message RefreshUserSessionsRequest {
  repeated RefreshUserSessionRequest sessions = 1;
}

message RefreshUserSessionsResponse {
  repeated string missing_session_ids = 1;
}

message UpdateUserPresenceRequest {
  int64 user_id = 1;
  string session_id = 2;
  PresenceStatus status = 3;
  ClientState client_state = 4;
  // Guild memberships captured by the calling session node; presence
  // transition events fan out through these guild routes.
  repeated int64 guild_ids = 5;
}

message UpdateUserPresenceResponse {
  UserPresence presence = 1;
}

message RemoveUserSessionRequest {
  int64 user_id = 1;
  string session_id = 2;
  // Guild memberships captured by the calling session node; presence
  // transition events fan out through these guild routes.
  repeated int64 guild_ids = 3;
}

message RemoveUserSessionResponse {
  bool ok = 1;
}

message ResolveUsersPresenceRequest {
  repeated int64 user_ids = 1;
}

message ResolveUsersPresenceResponse {
  repeated UserPresence presences = 1;
}
