edition = "2023";

package session.v1;

// SessionService owns logical realtime sessions and their replay streams.
service SessionService {
  // Connect carries one gateway connection for the lifetime of its logical
  // session binding. The first gateway message must contain identify or resume.
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);

  // DispatchGuildEvent fans an event out to matching sessions on this node.
  rpc DispatchGuildEvent(DispatchGuildEventRequest) returns (DispatchGuildEventResponse);

  // DispatchChannelEvent fans an event out to channel subscribers on this node.
  rpc DispatchChannelEvent(DispatchChannelEventRequest) returns (DispatchChannelEventResponse);

  // DispatchUserEvent fans an event out to sessions for one user on this node.
  rpc DispatchUserEvent(DispatchUserEventRequest) returns (DispatchUserEventResponse);
}

message ConnectRequest {
  string connection_id = 1;
  string gateway_id = 8;
  string gateway_generation = 9;
  oneof payload {
    Identify identify = 2;
    Resume resume = 3;
    Heartbeat heartbeat = 4;
    PresenceUpdate presence = 5;
    SubscribeChannels subscribe = 6;
    Detach detach = 7;
  }
}

message Identify {
  string token = 1;
  string device_type = 2;
  string status = 3;
  string client_state = 4;
}

message Resume {
  string token = 1;
  string session_id = 2;
  uint64 sequence = 3;
}

message Heartbeat {
  uint64 sequence = 1;
}

message PresenceUpdate {
  string status = 1;
  string client_state = 2;
}

message SubscribeChannels {
  repeated int64 channel_ids = 1;
}

message Detach {
  bool resumable = 1;
}

message ConnectResponse {
  int32 opcode = 1;
  uint64 sequence = 2;
  string type = 3;
  string json_payload = 4;
  int32 close_code = 5;
  string close_reason = 6;
}

message EventEnvelope {
  string type = 1;
  string json_payload = 2;
}

message DispatchGuildEventRequest {
  int64 guild_id = 1;
  EventEnvelope event = 2;
}

message DispatchChannelEventRequest {
  int64 channel_id = 1;
  EventEnvelope event = 2;
}

message DispatchUserEventRequest {
  int64 user_id = 1;
  EventEnvelope event = 2;
}

message DispatchGuildEventResponse {
  int32 delivered = 1;
}

message DispatchChannelEventResponse {
  int32 delivered = 1;
}

message DispatchUserEventResponse {
  int32 delivered = 1;
}
