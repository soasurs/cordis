edition = "2023";

package user.v1;

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc VerifyPassword(VerifyPasswordRequest) returns (VerifyPasswordResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc CheckEmailAvailability(CheckEmailAvailabilityRequest) returns (CheckEmailAvailabilityResponse);
  rpc UpdateEmail(UpdateEmailRequest) returns (UpdateEmailResponse);
  // UpdateUserProfile replaces all mutable public profile fields.
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
}

message User {
  int64 user_id = 1;
  string email = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
  int64 deleted_at = 5;
}

message UserProfile {
  int64 user_id = 1;
  string name = 2;
  string avatar_uri = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int64 deleted_at = 6;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  oneof identity {
    int64 user_id = 1;
    string email = 2;
  }
}

message GetUserResponse {
  User user = 1;
}

message GetUserProfileRequest {
  int64 user_id = 1;
}

message GetUserProfileResponse {
  UserProfile profile = 1;
}

message VerifyPasswordRequest {
  string email = 1;
  string password = 2;
}

message VerifyPasswordResponse {
  bool ok = 1;
  bool require_challenge = 2;
  int64 user_id = 3;
}

message ChangePasswordRequest {
  int64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  bool ok = 1;
}

message CheckEmailAvailabilityRequest {
  string email = 1;
}

message CheckEmailAvailabilityResponse {
  bool available = 1;
}

message UpdateEmailRequest {
  int64 user_id = 1;
  string email = 2;
}

message UpdateEmailResponse {
  User user = 1;
}

message UpdateUserProfileRequest {
  int64 user_id = 1;
  string name = 2;
  string avatar_uri = 3;
}

message UpdateUserProfileResponse {
  UserProfile profile = 1;
}
