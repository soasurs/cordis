name: dispatcher.v1

probeServer:
  listenOn: 0.0.0.0:6069

log:
  level: error
  stat: false

telemetry:
  endpoint: "${CORDIS_OTEL_ENDPOINT}"
  # Local development captures all spans; production should use a lower ratio.
  sampler: 1.0
  batcher: otlpgrpc

kafka:
  seeds:
    - 127.0.0.1:9092
  guildTopic: cordis.guild.events.v1
  messageTopic: cordis.message.events.v1
  userTopic: cordis.user.events.v1
  presenceTopic: cordis.presence.events.v1
  consumerGroup: cordis.dispatcher.v1

redis:
  host: 127.0.0.1:6379
  type: node

sessionRegistry:
  hosts:
    - 127.0.0.1:2379
  prefix: /cordis/session/nodes
  dialTimeoutSeconds: 5

dispatcher:
  dispatchTimeoutSeconds: 5
  retryMinMilliseconds: 100
  retryMaxSeconds: 5

services:
  user:
    endpoints:
      - 127.0.0.1:3000
