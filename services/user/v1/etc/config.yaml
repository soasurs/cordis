name: user.v1
listenOn: 0.0.0.0:3000
timeout: 0
health: false

log:
  level: error
  stat: false

devServer:
  enabled: true
  host: 0.0.0.0
  port: 6062
  enableMetrics: true
  enablePprof: false

telemetry:
  endpoint: "${CORDIS_OTEL_ENDPOINT}"
  sampler: 1.0
  batcher: otlpgrpc

middlewares:
  trace: true
  recover: true
  stat: false
  prometheus: true
  breaker: true

database:
  dataSource: postgres://cordis:cordis@127.0.0.1:5432/cordis?sslmode=disable
  maxOpenConns: 10
  maxIdleConns: 5

services:
  media:
    endpoints:
      - 127.0.0.1:3008
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
