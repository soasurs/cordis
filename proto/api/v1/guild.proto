edition = "2023";

package api.v1;

// GuildService exposes authenticated guild metadata operations.
service GuildService {
  rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);
  rpc GetGuild(GetGuildRequest) returns (GetGuildResponse);
  rpc ListGuilds(ListGuildsRequest) returns (ListGuildsResponse);
  rpc UpdateGuild(UpdateGuildRequest) returns (UpdateGuildResponse);
  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse);
  rpc AddGuildMember(AddGuildMemberRequest) returns (AddGuildMemberResponse);
  rpc GetGuildMember(GetGuildMemberRequest) returns (GetGuildMemberResponse);
  rpc ListGuildMembers(ListGuildMembersRequest) returns (ListGuildMembersResponse);
  rpc UpdateCurrentGuildMember(UpdateCurrentGuildMemberRequest) returns (UpdateCurrentGuildMemberResponse);
  rpc KickGuildMember(KickGuildMemberRequest) returns (KickGuildMemberResponse);
  rpc LeaveGuild(LeaveGuildRequest) returns (LeaveGuildResponse);
  rpc TransferGuildOwnership(TransferGuildOwnershipRequest) returns (TransferGuildOwnershipResponse);
}

// Guild is a community the authenticated user belongs to.
// All timestamps are Unix time in milliseconds.
message Guild {
  int64 id = 1;
  int64 owner_id = 2;
  string name = 3;
  string icon_uri = 4;
  int64 revision = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

// GuildMember is a user's membership in one guild.
// All timestamps are Unix time in milliseconds.
message GuildMember {
  int64 guild_id = 1;
  int64 user_id = 2;
  string nickname = 3;
  int64 revision = 4;
  int64 joined_at = 5;
  int64 updated_at = 6;
}

message CreateGuildRequest {
  string name = 1;
  string icon_uri = 2;
}

message CreateGuildResponse {
  Guild guild = 1;
}

message GetGuildRequest {
  int64 guild_id = 1;
}

message GetGuildResponse {
  Guild guild = 1;
}

message ListGuildsRequest {
  int64 before = 1;
  int32 limit = 2;
}

message ListGuildsResponse {
  repeated Guild guilds = 1;
  int64 before_cursor = 2;
}

message UpdateGuildRequest {
  int64 guild_id = 1;
  // Optional replacement fields. An explicit empty icon_uri clears the icon.
  string name = 2;
  string icon_uri = 3;
}

message UpdateGuildResponse {
  Guild guild = 1;
}

message DeleteGuildRequest {
  int64 guild_id = 1;
}

message DeleteGuildResponse {
  bool ok = 1;
}

message AddGuildMemberRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message AddGuildMemberResponse {
  GuildMember member = 1;
}

message GetGuildMemberRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message GetGuildMemberResponse {
  GuildMember member = 1;
}

message ListGuildMembersRequest {
  int64 guild_id = 1;
  int64 before_user_id = 2;
  int32 limit = 3;
}

message ListGuildMembersResponse {
  repeated GuildMember members = 1;
  int64 before_user_id = 2;
}

message UpdateCurrentGuildMemberRequest {
  int64 guild_id = 1;
  // Replaces the caller's guild nickname. An empty value clears it.
  string nickname = 2;
}

message UpdateCurrentGuildMemberResponse {
  GuildMember member = 1;
}

message KickGuildMemberRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message KickGuildMemberResponse {
  bool ok = 1;
}

message LeaveGuildRequest {
  int64 guild_id = 1;
}

message LeaveGuildResponse {
  bool ok = 1;
}

message TransferGuildOwnershipRequest {
  int64 guild_id = 1;
  int64 new_owner_id = 2;
}

message TransferGuildOwnershipResponse {
  Guild guild = 1;
}
