version: v2
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt:
      - paths=source_relative
      - simple
  - local: protoc-gen-es
    out: gen/web
    opt: target=ts
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/soasurs/cordis/gen
inputs:
  - directory: proto
    paths:
      - proto/api
