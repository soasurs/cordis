edition = "2023";

package guild.v1;

// GuildPermission values are bit flags combined in uint64 permission fields.
enum GuildPermission {
  GUILD_PERMISSION_UNSPECIFIED = 0;
  GUILD_PERMISSION_ADMINISTRATOR = 1;
  GUILD_PERMISSION_MANAGE_GUILD = 2;
  GUILD_PERMISSION_MANAGE_ROLES = 4;
  GUILD_PERMISSION_MANAGE_MEMBERS = 8;
  GUILD_PERMISSION_KICK_MEMBERS = 16;
  GUILD_PERMISSION_VIEW_CHANNEL = 32;
  GUILD_PERMISSION_SEND_MESSAGES = 64;
  GUILD_PERMISSION_MANAGE_CHANNELS = 128;
  GUILD_PERMISSION_MANAGE_MESSAGES = 256;
  GUILD_PERMISSION_BAN_MEMBERS = 512;
}

enum GuildChannelType {
  GUILD_CHANNEL_TYPE_UNSPECIFIED = 0;
  GUILD_CHANNEL_TYPE_TEXT = 1;
  GUILD_CHANNEL_TYPE_CATEGORY = 2;
  GUILD_CHANNEL_TYPE_VOICE = 3;
}

enum GuildPermissionOverwriteType {
  GUILD_PERMISSION_OVERWRITE_TYPE_UNSPECIFIED = 0;
  GUILD_PERMISSION_OVERWRITE_TYPE_ROLE = 1;
  GUILD_PERMISSION_OVERWRITE_TYPE_MEMBER = 2;
}

// GuildService owns guild metadata and membership boundaries.
service GuildService {
  rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);
  rpc GetGuild(GetGuildRequest) returns (GetGuildResponse);
  rpc ListUserGuilds(ListUserGuildsRequest) returns (ListUserGuildsResponse);
  rpc UpdateGuild(UpdateGuildRequest) returns (UpdateGuildResponse);
  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse);
  rpc AddGuildMember(AddGuildMemberRequest) returns (AddGuildMemberResponse);
  rpc GetGuildMember(GetGuildMemberRequest) returns (GetGuildMemberResponse);
  rpc ListGuildMembers(ListGuildMembersRequest) returns (ListGuildMembersResponse);
  rpc UpdateGuildMember(UpdateGuildMemberRequest) returns (UpdateGuildMemberResponse);
  rpc KickGuildMember(KickGuildMemberRequest) returns (KickGuildMemberResponse);
  rpc BanGuildMember(BanGuildMemberRequest) returns (BanGuildMemberResponse);
  rpc UnbanGuildMember(UnbanGuildMemberRequest) returns (UnbanGuildMemberResponse);
  rpc ListGuildBans(ListGuildBansRequest) returns (ListGuildBansResponse);
  rpc LeaveGuild(LeaveGuildRequest) returns (LeaveGuildResponse);
  rpc TransferGuildOwnership(TransferGuildOwnershipRequest) returns (TransferGuildOwnershipResponse);
  rpc CreateGuildRole(CreateGuildRoleRequest) returns (CreateGuildRoleResponse);
  rpc GetGuildRole(GetGuildRoleRequest) returns (GetGuildRoleResponse);
  rpc ListGuildRoles(ListGuildRolesRequest) returns (ListGuildRolesResponse);
  rpc UpdateGuildRole(UpdateGuildRoleRequest) returns (UpdateGuildRoleResponse);
  rpc DeleteGuildRole(DeleteGuildRoleRequest) returns (DeleteGuildRoleResponse);
  rpc ReorderGuildRoles(ReorderGuildRolesRequest) returns (ReorderGuildRolesResponse);
  rpc AddGuildMemberRole(AddGuildMemberRoleRequest) returns (AddGuildMemberRoleResponse);
  rpc RemoveGuildMemberRole(RemoveGuildMemberRoleRequest) returns (RemoveGuildMemberRoleResponse);
  rpc ListGuildMemberRoles(ListGuildMemberRolesRequest) returns (ListGuildMemberRolesResponse);
  rpc GetGuildMemberPermissions(GetGuildMemberPermissionsRequest) returns (GetGuildMemberPermissionsResponse);
  rpc CreateGuildChannel(CreateGuildChannelRequest) returns (CreateGuildChannelResponse);
  rpc GetGuildChannel(GetGuildChannelRequest) returns (GetGuildChannelResponse);
  rpc ListGuildChannels(ListGuildChannelsRequest) returns (ListGuildChannelsResponse);
  rpc UpdateGuildChannel(UpdateGuildChannelRequest) returns (UpdateGuildChannelResponse);
  rpc DeleteGuildChannel(DeleteGuildChannelRequest) returns (DeleteGuildChannelResponse);
  rpc ReorderGuildChannels(ReorderGuildChannelsRequest) returns (ReorderGuildChannelsResponse);
  rpc UpsertGuildChannelPermissionOverwrite(UpsertGuildChannelPermissionOverwriteRequest) returns (UpsertGuildChannelPermissionOverwriteResponse);
  rpc DeleteGuildChannelPermissionOverwrite(DeleteGuildChannelPermissionOverwriteRequest) returns (DeleteGuildChannelPermissionOverwriteResponse);
  rpc ListGuildChannelPermissionOverwrites(ListGuildChannelPermissionOverwritesRequest) returns (ListGuildChannelPermissionOverwritesResponse);
  rpc AuthorizeGuildChannel(AuthorizeGuildChannelRequest) returns (AuthorizeGuildChannelResponse);
}

message Guild {
  int64 id = 1;
  int64 owner_id = 2;
  string name = 3;
  string icon_uri = 4;
  int64 revision = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message GuildMember {
  int64 guild_id = 1;
  int64 user_id = 2;
  string nickname = 3;
  int64 revision = 4;
  int64 joined_at = 5;
  int64 updated_at = 6;
}

message GuildBan {
  int64 guild_id = 1;
  int64 user_id = 2;
  int64 actor_user_id = 3;
  string reason = 4;
  int64 created_at = 5;
}

message GuildRole {
  int64 id = 1;
  int64 guild_id = 2;
  string name = 3;
  uint64 permissions = 4;
  int32 position = 5;
  bool is_default = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message GuildChannel {
  int64 id = 1;
  int64 guild_id = 2;
  string name = 3;
  GuildChannelType type = 4;
  int32 position = 5;
  string topic = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 parent_id = 10;
}

message GuildChannelPermissionOverwrite {
  int64 channel_id = 1;
  int64 guild_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
  uint64 allow = 5;
  uint64 deny = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message CreateGuildRequest {
  int64 owner_id = 1;
  string name = 2;
  string icon_uri = 3;
}

message CreateGuildResponse {
  Guild guild = 1;
}

message GetGuildRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message GetGuildResponse {
  Guild guild = 1;
}

message ListUserGuildsRequest {
  int64 user_id = 1;
  // Return guilds with IDs smaller than this cursor.
  int64 before = 2;
  int32 limit = 3;
}

message ListUserGuildsResponse {
  repeated Guild guilds = 1;
  // Smallest guild ID in this page, or zero when this page is empty.
  int64 before_cursor = 2;
}

message UpdateGuildRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Optional replacement fields. An explicit empty icon_uri clears the icon.
  string name = 3;
  string icon_uri = 4;
}

message UpdateGuildResponse {
  Guild guild = 1;
}

message DeleteGuildRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message DeleteGuildResponse {
  bool ok = 1;
}

message AddGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message AddGuildMemberResponse {
  GuildMember member = 1;
}

message GetGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message GetGuildMemberResponse {
  GuildMember member = 1;
}

message ListGuildMembersRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Return members with user IDs smaller than this cursor.
  int64 before_user_id = 3;
  int32 limit = 4;
}

message ListGuildMembersResponse {
  repeated GuildMember members = 1;
  int64 before_user_id = 2;
}

message UpdateGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Replaces the actor's guild nickname. An empty value clears it.
  string nickname = 3;
}

message UpdateGuildMemberResponse {
  GuildMember member = 1;
}

message KickGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message KickGuildMemberResponse {
  bool ok = 1;
}

message BanGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  string reason = 4;
}

message BanGuildMemberResponse {
  GuildBan ban = 1;
}

message UnbanGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message UnbanGuildMemberResponse {
  bool ok = 1;
}

message ListGuildBansRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 before_user_id = 3;
  int32 limit = 4;
}

message ListGuildBansResponse {
  repeated GuildBan bans = 1;
  int64 before_user_id = 2;
}

message LeaveGuildRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message LeaveGuildResponse {
  bool ok = 1;
}

message TransferGuildOwnershipRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 new_owner_id = 3;
}

message TransferGuildOwnershipResponse {
  Guild guild = 1;
}

message CreateGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  string name = 3;
  uint64 permissions = 4;
}

message CreateGuildRoleResponse {
  GuildRole role = 1;
}

message GetGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
}

message GetGuildRoleResponse {
  GuildRole role = 1;
}

message ListGuildRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildRolesResponse {
  repeated GuildRole roles = 1;
}

message UpdateGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
  // Optional replacement fields.
  string name = 4;
  uint64 permissions = 5;
}

message UpdateGuildRoleResponse {
  GuildRole role = 1;
}

message DeleteGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
}

message DeleteGuildRoleResponse {
  bool ok = 1;
}

message GuildRolePosition {
  int64 role_id = 1;
  int32 position = 2;
}

message ReorderGuildRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  repeated GuildRolePosition positions = 3;
}

message ReorderGuildRolesResponse {
  repeated GuildRole roles = 1;
}

message AddGuildMemberRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  int64 role_id = 4;
}

message AddGuildMemberRoleResponse {
  bool ok = 1;
}

message RemoveGuildMemberRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  int64 role_id = 4;
}

message RemoveGuildMemberRoleResponse {
  bool ok = 1;
}

message ListGuildMemberRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message ListGuildMemberRolesResponse {
  repeated GuildRole roles = 1;
}

message GetGuildMemberPermissionsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message GetGuildMemberPermissionsResponse {
  uint64 permissions = 1;
}

message CreateGuildChannelRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  string name = 3;
  GuildChannelType type = 4;
  string topic = 5;
  int64 parent_id = 6;
}

message CreateGuildChannelResponse {
  GuildChannel channel = 1;
}

message GetGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message GetGuildChannelResponse {
  GuildChannel channel = 1;
}

message ListGuildChannelsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildChannelsResponse {
  repeated GuildChannel channels = 1;
}

message UpdateGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  // Optional replacement fields.
  string name = 3;
  string topic = 4;
  int64 parent_id = 5;
}

message UpdateGuildChannelResponse {
  GuildChannel channel = 1;
}

message DeleteGuildChannelRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message DeleteGuildChannelResponse {
  bool ok = 1;
}

message GuildChannelPosition {
  int64 channel_id = 1;
  int32 position = 2;
}

message ReorderGuildChannelsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  repeated GuildChannelPosition positions = 3;
}

message ReorderGuildChannelsResponse {
  repeated GuildChannel channels = 1;
}

message UpsertGuildChannelPermissionOverwriteRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
  uint64 allow = 5;
  uint64 deny = 6;
}

message UpsertGuildChannelPermissionOverwriteResponse {
  GuildChannelPermissionOverwrite overwrite = 1;
}

message DeleteGuildChannelPermissionOverwriteRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
}

message DeleteGuildChannelPermissionOverwriteResponse {
  bool ok = 1;
}

message ListGuildChannelPermissionOverwritesRequest {
  int64 channel_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildChannelPermissionOverwritesResponse {
  repeated GuildChannelPermissionOverwrite overwrites = 1;
}

message AuthorizeGuildChannelRequest {
  int64 channel_id = 1;
  int64 user_id = 2;
  uint64 permission = 3;
}

message AuthorizeGuildChannelResponse {
  bool allowed = 1;
  int64 guild_id = 2;
  uint64 permissions = 3;
  GuildChannelType channel_type = 4;
}
