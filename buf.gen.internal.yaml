version: v2
plugins:
  - local: ["go", "tool", "protoc-gen-go"]
    out: gen
    opt:
      - paths=source_relative
      - default_api_level=API_OPAQUE
  - local: ["go", "tool", "protoc-gen-go-grpc"]
    out: gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/soasurs/cordis/gen
inputs:
  - directory: proto
    paths:
      - proto/authenticator
      - proto/user
      - proto/message
      - proto/presence
      - proto/gateway
