name: api.v1
listenOn: 0.0.0.0:8080

log:
  level: error
  stat: false

observability:
  metrics:
    enabled: true
    listenOn: 0.0.0.0:6060
    path: /metrics
  tracing:
    endpoint: "${CORDIS_OTEL_ENDPOINT}"
    sampler: 1.0
    insecure: true

rateLimit:
  redis:
    host: 127.0.0.1:6379
    type: node
    nonBlock: true
  keyPrefix: "cordis:api:rate_limit:"
  fallbackMaxKeys: 10000
  fallbackRetryInterval: 1s
  # Forwarded headers are ignored unless the immediate peer matches one of
  # these CIDRs. Configure the actual load balancer networks in production.
  trustedProxies: []
  policies:
    source_ip_guard:
      limit: 20000
      window: 1m
    authenticated_user:
      limit: 300
      window: 1m

services:
  authenticator:
    endpoints:
      - 127.0.0.1:3001
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  user:
    endpoints:
      - 127.0.0.1:3000
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  message:
    endpoints:
      - 127.0.0.1:3002
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  guild:
    endpoints:
      - 127.0.0.1:3005
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
