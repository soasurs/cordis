edition = "2023";

package user.v1;

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  // BatchGetUserProfiles returns the existing public profiles for up to 100
  // user IDs. Results are keyed by UserProfile.user_id and may be reordered.
  rpc BatchGetUserProfiles(BatchGetUserProfilesRequest) returns (BatchGetUserProfilesResponse);
  // GetUserProfileByUsername resolves the globally unique handle.
  rpc GetUserProfileByUsername(GetUserProfileByUsernameRequest) returns (GetUserProfileByUsernameResponse);
  rpc CheckEmailAvailability(CheckEmailAvailabilityRequest) returns (CheckEmailAvailabilityResponse);
  rpc UpdateEmail(UpdateEmailRequest) returns (UpdateEmailResponse);
  // MarkEmailVerified records verification only while the supplied email is
  // still the user's current email.
  rpc MarkEmailVerified(MarkEmailVerifiedRequest) returns (MarkEmailVerifiedResponse);
  // UpdateUserProfile replaces all mutable public profile fields.
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
  // UpdateUsername replaces the unique handle; the old handle is released
  // immediately.
  rpc UpdateUsername(UpdateUsernameRequest) returns (UpdateUsernameResponse);
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);
  rpc AcceptFriendRequest(AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse);
  rpc DeclineFriendRequest(DeclineFriendRequestRequest) returns (DeclineFriendRequestResponse);
  // RemoveFriend deletes a friendship or retracts a pending request in
  // either direction.
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse);
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);
  rpc ListRelationships(ListRelationshipsRequest) returns (ListRelationshipsResponse);
  // CheckRelationships is an internal batch lookup for other services,
  // primarily to enforce blocks.
  rpc CheckRelationships(CheckRelationshipsRequest) returns (CheckRelationshipsResponse);
}

// RelationshipType values match the stored representation.
enum RelationshipType {
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  // The user sent a friend request that is still pending.
  RELATIONSHIP_TYPE_OUTGOING = 1;
  // The user received a friend request that is still pending.
  RELATIONSHIP_TYPE_INCOMING = 2;
  RELATIONSHIP_TYPE_FRIEND = 3;
  RELATIONSHIP_TYPE_BLOCKED = 4;
}

// Relationship is one user's view of their link to another user.
message Relationship {
  int64 user_id = 1;
  int64 target_id = 2;
  RelationshipType type = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message User {
  int64 user_id = 1;
  string email = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
  int64 deleted_at = 5;
  // Zero when the current email has not been verified.
  int64 email_verified_at = 6;
}

message UserProfile {
  int64 user_id = 1;
  string name = 2;
  string avatar_uri = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int64 deleted_at = 6;
  // Globally unique lowercase handle.
  string username = 7;
}

// User identity is owned by this service; authentication credentials are
// owned by the authenticator service.
message CreateUserRequest {
  string name = 1;
  string email = 2;
  string username = 3;
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  oneof identity {
    int64 user_id = 1;
    string email = 2;
  }
}

message GetUserResponse {
  User user = 1;
}

message GetUserProfileRequest {
  int64 user_id = 1;
}

message GetUserProfileResponse {
  UserProfile profile = 1;
}

message BatchGetUserProfilesRequest {
  repeated int64 user_ids = 1;
}

message BatchGetUserProfilesResponse {
  repeated UserProfile profiles = 1;
}

message CheckEmailAvailabilityRequest {
  string email = 1;
}

message CheckEmailAvailabilityResponse {
  bool available = 1;
}

message UpdateEmailRequest {
  int64 user_id = 1;
  string email = 2;
}

message UpdateEmailResponse {
  User user = 1;
}

message MarkEmailVerifiedRequest {
  int64 user_id = 1;
  // The email address the verification token was issued for.
  string email = 2;
  int64 verified_at = 3;
}

message MarkEmailVerifiedResponse {
  bool ok = 1;
}

message UpdateUserProfileRequest {
  int64 user_id = 1;
  // Optional replacement field. When absent, the current name is preserved.
  string name = 2;
  // Optional replacement field. An explicit empty string clears the avatar.
  string avatar_uri = 3;
}

message UpdateUserProfileResponse {
  UserProfile profile = 1;
}

message GetUserProfileByUsernameRequest {
  string username = 1;
}

message GetUserProfileByUsernameResponse {
  UserProfile profile = 1;
}

message SendFriendRequestRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message SendFriendRequestResponse {
  // Outgoing after a fresh request, or friend when the target had already
  // sent a request the other way.
  Relationship relationship = 1;
}

message AcceptFriendRequestRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message AcceptFriendRequestResponse {
  Relationship relationship = 1;
}

message DeclineFriendRequestRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message DeclineFriendRequestResponse {
  bool ok = 1;
}

message RemoveFriendRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message RemoveFriendResponse {
  bool ok = 1;
}

message BlockUserRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message BlockUserResponse {
  Relationship relationship = 1;
}

message UnblockUserRequest {
  int64 user_id = 1;
  int64 target_id = 2;
}

message UnblockUserResponse {
  bool ok = 1;
}

message ListRelationshipsRequest {
  int64 user_id = 1;
  // Optional filter; unspecified returns every type.
  RelationshipType type = 2;
  // Return relationships with target IDs smaller than this cursor.
  int64 before_target_id = 3;
  int32 limit = 4;
}

message ListRelationshipsResponse {
  repeated Relationship relationships = 1;
  int64 before_target_id = 2;
}

message CheckRelationshipsRequest {
  int64 user_id = 1;
  repeated int64 target_ids = 2;
  // When set, rows where a target points back at user_id are also returned
  // (their user_id/target_id are the target's perspective). Both directions
  // come from one query, so callers see a single consistent snapshot -
  // primarily for block enforcement in DMs.
  bool include_reverse = 3;
}

message CheckRelationshipsResponse {
  // Only existing relationships are returned.
  repeated Relationship relationships = 1;
}

message UpdateUsernameRequest {
  int64 user_id = 1;
  string username = 2;
}

message UpdateUsernameResponse {
  UserProfile profile = 1;
}
