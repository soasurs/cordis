edition = "2023";

package guild.v1;

// GuildPermission values are bit flags combined in uint64 permission fields.
enum GuildPermission {
  GUILD_PERMISSION_UNSPECIFIED = 0;
  GUILD_PERMISSION_ADMINISTRATOR = 1;
  GUILD_PERMISSION_MANAGE_GUILD = 2;
  GUILD_PERMISSION_MANAGE_ROLES = 4;
  GUILD_PERMISSION_MANAGE_MEMBERS = 8;
  GUILD_PERMISSION_KICK_MEMBERS = 16;
  GUILD_PERMISSION_VIEW_CHANNEL = 32;
  GUILD_PERMISSION_SEND_MESSAGES = 64;
  GUILD_PERMISSION_MANAGE_CHANNELS = 128;
  GUILD_PERMISSION_MANAGE_MESSAGES = 256;
  GUILD_PERMISSION_BAN_MEMBERS = 512;
  GUILD_PERMISSION_CREATE_INVITE = 1024;
}

enum GuildChannelType {
  GUILD_CHANNEL_TYPE_UNSPECIFIED = 0;
  GUILD_CHANNEL_TYPE_TEXT = 1;
  GUILD_CHANNEL_TYPE_CATEGORY = 2;
  GUILD_CHANNEL_TYPE_VOICE = 3;
}

enum GuildPermissionOverwriteType {
  GUILD_PERMISSION_OVERWRITE_TYPE_UNSPECIFIED = 0;
  GUILD_PERMISSION_OVERWRITE_TYPE_ROLE = 1;
  GUILD_PERMISSION_OVERWRITE_TYPE_MEMBER = 2;
}

// GuildService owns guild metadata and membership boundaries.
service GuildService {
  rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);
  rpc GetGuild(GetGuildRequest) returns (GetGuildResponse);
  rpc ListUserGuilds(ListUserGuildsRequest) returns (ListUserGuildsResponse);
  // GetUserReadyState returns the complete Guild bootstrap for one user.
  rpc GetUserReadyState(GetUserReadyStateRequest) returns (GetUserReadyStateResponse);
  // GetUserGuildChannelVisibility returns a single Guild visibility snapshot
  // for an on-demand snapshot reload by Session nodes.
  rpc GetUserGuildChannelVisibility(GetUserGuildChannelVisibilityRequest) returns (GetUserGuildChannelVisibilityResponse);
  rpc UpdateGuild(UpdateGuildRequest) returns (UpdateGuildResponse);
  rpc CreateGuildIconUpload(CreateGuildIconUploadRequest) returns (CreateGuildIconUploadResponse);
  rpc CompleteGuildIconUpload(CompleteGuildIconUploadRequest) returns (CompleteGuildIconUploadResponse);
  rpc AbortGuildIconUpload(AbortGuildIconUploadRequest) returns (AbortGuildIconUploadResponse);
  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse);
  rpc AddGuildMember(AddGuildMemberRequest) returns (AddGuildMemberResponse);
  rpc GetGuildMember(GetGuildMemberRequest) returns (GetGuildMemberResponse);
  rpc ListGuildMembers(ListGuildMembersRequest) returns (ListGuildMembersResponse);
  rpc UpdateGuildMember(UpdateGuildMemberRequest) returns (UpdateGuildMemberResponse);
  rpc KickGuildMember(KickGuildMemberRequest) returns (KickGuildMemberResponse);
  rpc BanGuildMember(BanGuildMemberRequest) returns (BanGuildMemberResponse);
  rpc UnbanGuildMember(UnbanGuildMemberRequest) returns (UnbanGuildMemberResponse);
  rpc ListGuildBans(ListGuildBansRequest) returns (ListGuildBansResponse);
  rpc LeaveGuild(LeaveGuildRequest) returns (LeaveGuildResponse);
  rpc TransferGuildOwnership(TransferGuildOwnershipRequest) returns (TransferGuildOwnershipResponse);
  rpc CreateGuildInvite(CreateGuildInviteRequest) returns (CreateGuildInviteResponse);
  rpc GetGuildInvite(GetGuildInviteRequest) returns (GetGuildInviteResponse);
  rpc ListGuildInvites(ListGuildInvitesRequest) returns (ListGuildInvitesResponse);
  rpc DeleteGuildInvite(DeleteGuildInviteRequest) returns (DeleteGuildInviteResponse);
  rpc JoinGuildByInvite(JoinGuildByInviteRequest) returns (JoinGuildByInviteResponse);
  rpc CreateGuildRole(CreateGuildRoleRequest) returns (CreateGuildRoleResponse);
  rpc GetGuildRole(GetGuildRoleRequest) returns (GetGuildRoleResponse);
  rpc ListGuildRoles(ListGuildRolesRequest) returns (ListGuildRolesResponse);
  rpc UpdateGuildRole(UpdateGuildRoleRequest) returns (UpdateGuildRoleResponse);
  rpc DeleteGuildRole(DeleteGuildRoleRequest) returns (DeleteGuildRoleResponse);
  rpc ReorderGuildRoles(ReorderGuildRolesRequest) returns (ReorderGuildRolesResponse);
  rpc AddGuildMemberRole(AddGuildMemberRoleRequest) returns (AddGuildMemberRoleResponse);
  rpc RemoveGuildMemberRole(RemoveGuildMemberRoleRequest) returns (RemoveGuildMemberRoleResponse);
  rpc ListGuildMemberRoles(ListGuildMemberRolesRequest) returns (ListGuildMemberRolesResponse);
  rpc GetGuildMemberPermissions(GetGuildMemberPermissionsRequest) returns (GetGuildMemberPermissionsResponse);
  rpc CreateGuildChannel(CreateGuildChannelRequest) returns (CreateGuildChannelResponse);
  rpc GetGuildChannel(GetGuildChannelRequest) returns (GetGuildChannelResponse);
  rpc ListGuildChannels(ListGuildChannelsRequest) returns (ListGuildChannelsResponse);
  rpc UpdateGuildChannel(UpdateGuildChannelRequest) returns (UpdateGuildChannelResponse);
  rpc DeleteGuildChannel(DeleteGuildChannelRequest) returns (DeleteGuildChannelResponse);
  rpc ReorderGuildChannels(ReorderGuildChannelsRequest) returns (ReorderGuildChannelsResponse);
  rpc UpsertGuildChannelPermissionOverwrite(UpsertGuildChannelPermissionOverwriteRequest) returns (UpsertGuildChannelPermissionOverwriteResponse);
  rpc DeleteGuildChannelPermissionOverwrite(DeleteGuildChannelPermissionOverwriteRequest) returns (DeleteGuildChannelPermissionOverwriteResponse);
  rpc ListGuildChannelPermissionOverwrites(ListGuildChannelPermissionOverwritesRequest) returns (ListGuildChannelPermissionOverwritesResponse);
  rpc AuthorizeGuildChannel(AuthorizeGuildChannelRequest) returns (AuthorizeGuildChannelResponse);
}

message Guild {
  int64 id = 1;
  int64 owner_id = 2;
  string name = 3;
  // Zero means the Guild has no icon. This service persists only the Media
  // asset ID; the public API defines the deterministic CDN path contract.
  int64 icon_asset_id = 4;
  int64 revision = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message GuildMember {
  int64 guild_id = 1;
  int64 user_id = 2;
  string nickname = 3;
  int64 revision = 4;
  int64 joined_at = 5;
  int64 updated_at = 6;
}

message GuildBan {
  int64 guild_id = 1;
  int64 user_id = 2;
  int64 actor_user_id = 3;
  string reason = 4;
  int64 created_at = 5;
}

message GuildRole {
  int64 id = 1;
  int64 guild_id = 2;
  string name = 3;
  uint64 permissions = 4;
  int32 position = 5;
  bool is_default = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message GuildChannel {
  int64 id = 1;
  int64 guild_id = 2;
  string name = 3;
  GuildChannelType type = 4;
  int32 position = 5;
  string topic = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 parent_id = 10;
}

message GuildChannelPermissionOverwrite {
  int64 channel_id = 1;
  int64 guild_id = 2;
  GuildPermissionOverwriteType target_type = 3;
  int64 target_id = 4;
  uint64 allow = 5;
  uint64 deny = 6;
  int64 revision = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message CreateGuildRequest {
  int64 owner_id = 1;
  string name = 2;
}

message CreateGuildResponse {
  Guild guild = 1;
}

message GetGuildRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message GetGuildResponse {
  Guild guild = 1;
}

message ListUserGuildsRequest {
  int64 user_id = 1;
  // Return guilds with IDs smaller than this cursor.
  int64 before = 2;
  int32 limit = 3;
}

message ListUserGuildsResponse {
  repeated Guild guilds = 1;
  // Smallest guild ID in this page, or zero when this page is empty.
  int64 before_cursor = 2;
}

message GuildChannelVisibility {
  int64 guild_id = 1;
  int64 access_revision = 2;
  // Visible channel IDs sorted in ascending numeric order.
  repeated int64 visible_channel_ids = 3;
  // Visible text channel IDs used for scoped read-state reconciliation.
  repeated int64 visible_text_channel_ids = 4;
}

message ReadyGuild {
  Guild guild = 1;
  int64 access_revision = 2;
  repeated GuildRole roles = 3;
  // Explicit role assignments for the current user. The default role is
  // implicit and is not repeated here.
  repeated int64 member_role_ids = 4;
  // Only channels currently visible to the user are returned.
  repeated GuildChannel channels = 5;
  // Permission overwrites for the returned visible channels.
  repeated GuildChannelPermissionOverwrite permission_overwrites = 6;
}

message GetUserReadyStateRequest {
  int64 user_id = 1;
}

message GetUserReadyStateResponse {
  repeated ReadyGuild guilds = 1;
}


message GetUserGuildChannelVisibilityRequest {
  int64 user_id = 1;
  int64 guild_id = 2;
}

message GetUserGuildChannelVisibilityResponse {
  GuildChannelVisibility visibility = 1;
}

message UpdateGuildRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Optional replacement name.
  string name = 3;
}

message UpdateGuildResponse {
  Guild guild = 1;
}

// CreateGuildIconUploadRequest carries an authenticated actor, target Guild,
// and exact image upload contract to Media.
message CreateGuildIconUploadRequest {
  int64 guild_id = 1;
  // actor_user_id is derived from verified authentication state by the API
  // service and must hold MANAGE_GUILD.
  int64 actor_user_id = 2;
  // Exact Content-Length in bytes for the subsequent PUT.
  int64 expected_size = 3;
  // Canonical image/jpeg, image/png, or image/webp media type.
  string content_type = 4;
}

// CreateGuildIconUploadResponse forwards Media's direct-upload contract.
message CreateGuildIconUploadResponse {
  // Opaque upload identifier used for completion or abort.
  int64 upload_id = 1;
  // Short-lived URL accepting one PUT with the declared length and media type.
  string presigned_url = 2;
  // Upload session expiration as Unix milliseconds.
  int64 expires_at = 3;
}

// CompleteGuildIconUploadRequest publishes an owned upload and associates the
// resulting asset with the same Guild after rechecking permission.
message CompleteGuildIconUploadRequest {
  int64 guild_id = 1;
  // actor_user_id is the authenticated user that created the upload.
  int64 actor_user_id = 2;
  // upload_id is the opaque value returned by CreateGuildIconUpload.
  int64 upload_id = 3;
}

// CompleteGuildIconUploadResponse returns the Guild after association.
message CompleteGuildIconUploadResponse {
  Guild guild = 1;
}

// AbortGuildIconUploadRequest cancels an unpublished upload owned by the actor
// and scoped to the target Guild.
message AbortGuildIconUploadRequest {
  int64 guild_id = 1;
  // actor_user_id is the authenticated user forwarded by the API service.
  int64 actor_user_id = 2;
  // upload_id is the opaque value returned by CreateGuildIconUpload.
  int64 upload_id = 3;
}

// AbortGuildIconUploadResponse is empty because abort has no mutable result.
message AbortGuildIconUploadResponse {}

message DeleteGuildRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message DeleteGuildResponse {
  bool ok = 1;
}

message AddGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message AddGuildMemberResponse {
  GuildMember member = 1;
}

message GetGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message GetGuildMemberResponse {
  GuildMember member = 1;
}

message ListGuildMembersRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Return members with user IDs smaller than this cursor.
  int64 before_user_id = 3;
  int32 limit = 4;
}

message ListGuildMembersResponse {
  repeated GuildMember members = 1;
  int64 before_user_id = 2;
}

message UpdateGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Replaces the actor's guild nickname. An empty value clears it.
  string nickname = 3;
}

message UpdateGuildMemberResponse {
  GuildMember member = 1;
}

message KickGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message KickGuildMemberResponse {
  bool ok = 1;
}

message BanGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  string reason = 4;
}

message BanGuildMemberResponse {
  GuildBan ban = 1;
}

message UnbanGuildMemberRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message UnbanGuildMemberResponse {
  bool ok = 1;
}

message ListGuildBansRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 before_user_id = 3;
  int32 limit = 4;
}

message ListGuildBansResponse {
  repeated GuildBan bans = 1;
  int64 before_user_id = 2;
}

message LeaveGuildRequest {
  int64 guild_id = 1;
  int64 user_id = 2;
}

message LeaveGuildResponse {
  bool ok = 1;
}

message TransferGuildOwnershipRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 new_owner_id = 3;
}

message TransferGuildOwnershipResponse {
  Guild guild = 1;
}

message GuildInvite {
  int64 id = 1;
  string code = 2;
  int64 guild_id = 3;
  int64 creator_user_id = 4;
  // Zero means unlimited uses.
  int32 max_uses = 5;
  int32 uses = 6;
  // Zero means the invite never expires.
  int64 expires_at = 7;
  int64 created_at = 8;
}

// GuildInvitePreview is the guild summary shown to a user before joining.
message GuildInvitePreview {
  string code = 1;
  int64 guild_id = 2;
  string guild_name = 3;
  // Zero means the Guild has no icon. The public API defines how clients turn
  // this asset ID and guild_id into a CDN URL.
  int64 guild_icon_asset_id = 4;
  int64 member_count = 5;
  int64 expires_at = 6;
}

message CreateGuildInviteRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Zero means unlimited uses.
  int32 max_uses = 3;
  // Relative lifetime in milliseconds. Zero means the invite never expires.
  int64 expires_in_ms = 4;
}

message CreateGuildInviteResponse {
  GuildInvite invite = 1;
}

message GetGuildInviteRequest {
  string code = 1;
}

message GetGuildInviteResponse {
  GuildInvitePreview preview = 1;
}

message ListGuildInvitesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  // Return invites with IDs smaller than this cursor.
  int64 before_id = 3;
  int32 limit = 4;
}

message ListGuildInvitesResponse {
  repeated GuildInvite invites = 1;
  int64 before_id = 2;
}

message DeleteGuildInviteRequest {
  string code = 1;
  int64 actor_user_id = 2;
}

message DeleteGuildInviteResponse {
  bool ok = 1;
}

message JoinGuildByInviteRequest {
  string code = 1;
  int64 user_id = 2;
}

message JoinGuildByInviteResponse {
  Guild guild = 1;
  GuildMember member = 2;
}

message CreateGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  string name = 3;
  uint64 permissions = 4;
}

message CreateGuildRoleResponse {
  GuildRole role = 1;
}

message GetGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
}

message GetGuildRoleResponse {
  GuildRole role = 1;
}

message ListGuildRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
}

message ListGuildRolesResponse {
  repeated GuildRole roles = 1;
}

message UpdateGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
  // Optional replacement fields.
  string name = 4;
  uint64 permissions = 5;
}

message UpdateGuildRoleResponse {
  GuildRole role = 1;
}

message DeleteGuildRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 role_id = 3;
}

message DeleteGuildRoleResponse {
  bool ok = 1;
}

message GuildRolePosition {
  int64 role_id = 1;
  int32 position = 2;
}

message ReorderGuildRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  repeated GuildRolePosition positions = 3;
}

message ReorderGuildRolesResponse {
  repeated GuildRole roles = 1;
}

message AddGuildMemberRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  int64 role_id = 4;
}

message AddGuildMemberRoleResponse {
  bool ok = 1;
}

message RemoveGuildMemberRoleRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
  int64 role_id = 4;
}

message RemoveGuildMemberRoleResponse {
  bool ok = 1;
}

message ListGuildMemberRolesRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message ListGuildMemberRolesResponse {
  repeated GuildRole roles = 1;
}

message GetGuildMemberPermissionsRequest {
  int64 guild_id = 1;
  int64 actor_user_id = 2;
  int64 user_id = 3;
}

message GetGuildMemberPermissionsResponse {
