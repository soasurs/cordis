name: api.v1
listenOn: 0.0.0.0:8080

log:
  level: error
  stat: false

observability:
  metrics:
    enabled: true
    listenOn: 0.0.0.0:6060
    path: /metrics
  tracing:
    endpoint: "${CORDIS_OTEL_ENDPOINT}"
    sampler: 1.0
    insecure: true

rateLimit:
  redis:
    host: 127.0.0.1:6379
    type: node
    nonBlock: true
  keyPrefix: "cordis:api:rate_limit:"
  fallbackMaxKeys: 10000
  fallbackRetryInterval: 1s
  # Forwarded headers are ignored unless the immediate peer matches one of
  # these CIDRs. Configure the actual load balancer networks in production.
  trustedProxies: []
  policies:
    source_ip_guard:
      limit: 20000
      window: 1m
    authenticated_user:
      limit: 300
      window: 1m
    register_ip:
      limit: 30
      window: 10m
    register_email:
      limit: 3
      window: 1h
    login_ip:
      limit: 600
      window: 5m
    login_email:
      limit: 20
      window: 5m
    confirm_password_reset_ip:
      limit: 30
      window: 10m
    get_user_profile_ip:
      limit: 600
      window: 1m
    check_email_availability_ip:
      limit: 60
      window: 1m
    recovery_request_ip:
      limit: 30
      window: 10m
    create_message_user:
      limit: 30
      window: 10s
    create_message_channel:
      limit: 120
      window: 10s
    relationship_write:
      limit: 60
      window: 1m
    send_friend_request_minute:
      limit: 10
      window: 1m
    send_friend_request_day:
      limit: 100
      window: 24h
    block_unblock_debounce:
      limit: 1
      window: 5s
    create_guild_user:
      limit: 5
      window: 1h
    guild_resource_create_actor:
      limit: 30
      window: 1m
    guild_resource_create_guild:
      limit: 100
      window: 1h
    join_guild_invite_user:
      limit: 10
      window: 10m
    join_guild_invite_ip:
      limit: 30
      window: 10m

readStates:
  maxConcurrencyPerUser: 2

services:
  authenticator:
    endpoints:
      - 127.0.0.1:3001
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  user:
    endpoints:
      - 127.0.0.1:3000
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  message:
    endpoints:
      - 127.0.0.1:3002
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
  guild:
    endpoints:
      - 127.0.0.1:3005
    middlewares:
      trace: true
      duration: false
      prometheus: true
      breaker: true
      timeout: true
