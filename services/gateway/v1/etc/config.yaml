name: gateway.v1
listenOn: 0.0.0.0:8081

log:
  mode: console
  encoding: json
  level: info
  stat: false

gateway:
  websocketPath: /ws
  heartbeatIntervalMs: 45000
  identifyTimeoutSeconds: 10
  maxMessageBytes: 65536

redis:
  host: 127.0.0.1:6379
  type: node

sessionRegistry:
  hosts:
    - 127.0.0.1:2379
  prefix: /cordis/session/nodes
  dialTimeoutSeconds: 5
