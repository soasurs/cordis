name: gateway.v1
listenOn: 0.0.0.0:8081

probeServer:
  listenOn: 0.0.0.0:6065

log:
  mode: console
  encoding: json
  level: info
  stat: false

gateway:
  websocketPath: /
  originPatterns:
    - "${CORDIS_GATEWAY_ORIGIN}"
  heartbeatIntervalMs: 45000
  identifyTimeoutSeconds: 10
  maxMessageBytes: 65536
  maxConnectionsPerInstance: 50000
  maxPendingHandshakesPerInstance: 5000
  maxPendingHandshakesPerIPv4Scope: 100
  maxPendingHandshakesPerIPv6Scope: 20
  maxClientEventsPerMinute: 120
  heartbeatTimeoutIntervals: 2
  heartbeatEarlyTolerancePercent: 10
  checkpointIntervalMs: 5000
  checkpointBatchSize: 500

rateLimit:
  keyPrefix: "cordis:gateway:rate_limit:"
  fallbackMaxKeys: 10000
  fallbackRetryInterval: 1s
  trustedProxies:
    - 172.30.0.0/24
  policies:
    upgrade_ip_ipv4:
      limit: 1200
      window: 1m
    upgrade_ip_ipv6:
      limit: 120
      window: 1m
    identify_ip_ipv4:
      limit: 300
      window: 1m
    identify_ip_ipv6:
      limit: 30
      window: 1m
    resume_ip_ipv4:
      limit: 600
      window: 1m
    resume_ip_ipv6:
      limit: 60
      window: 1m
    resume_session:
      limit: 10
      window: 1m

redis:
  host: redis:6379
  type: node

sessionRegistry:
  hosts:
    - etcd:2379
  prefix: /cordis/session/nodes
  dialTimeoutSeconds: 5
