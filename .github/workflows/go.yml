name: Go

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/go.yml"
      - "services/**"
      - "pkg/**"
      - "internal/**"
      - "gen/**"
      - "proto/**"
      - "buf.yaml"
      - "buf.gen.external.yaml"
      - "buf.gen.internal.yaml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/go.yml"
      - "services/**"
      - "pkg/**"
      - "internal/**"
      - "gen/**"
      - "proto/**"
      - "buf.yaml"
      - "buf.gen.external.yaml"
      - "buf.gen.internal.yaml"
      - "Makefile"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          files=$(gofmt -l pkg internal services)
          if [ -n "$files" ]; then
            echo "gofmt needed on:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Buf lint
        run: make lint

  generated:
    name: Generated code
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Regenerate protobuf outputs
        run: make generate

      - name: Verify committed files are current
        run: git diff --exit-code

  test:
    name: Test
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  integration:
    name: Integration test
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Integration test
        run: make test-integration
