edition = "2023";

package api.v1;

import "api/v1/user.proto";

// MessageService exposes authenticated message operations.
// Channel membership and permissions are enforced by Message through Guild.
service MessageService {
  // CreateMessage creates a message authored by the bearer token owner.
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse);
  // UpdateMessage edits a message owned by the bearer token owner.
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  // DeleteMessage deletes a message owned by the bearer token owner.
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  // GetMessage returns one message after authenticating the caller.
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  // ListMessages returns messages in a channel ordered newest first.
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  // CreateAttachmentUpload creates a single-PUT private upload after checking
  // that the bearer token user may send messages in the channel.
  rpc CreateAttachmentUpload(CreateAttachmentUploadRequest) returns (CreateAttachmentUploadResponse);
  // CompleteAttachmentUpload validates object metadata and returns trusted
  // attachment metadata for use in CreateMessage or UpdateMessage.
  rpc CompleteAttachmentUpload(CompleteAttachmentUploadRequest) returns (CompleteAttachmentUploadResponse);
  // AbortAttachmentUpload cancels an unpublished attachment upload.
  rpc AbortAttachmentUpload(AbortAttachmentUploadRequest) returns (AbortAttachmentUploadResponse);
  // GetAttachmentDownloadURL returns a short-lived URL only after checking
  // message association and the caller's current channel visibility.
  rpc GetAttachmentDownloadURL(GetAttachmentDownloadURLRequest) returns (GetAttachmentDownloadURLResponse);
  // CreateDmChannel opens (or idempotently returns) the 1:1 channel with a
  // friend. Messages then flow through the regular message RPCs using the
  // returned channel ID.
  rpc CreateDmChannel(CreateDmChannelRequest) returns (CreateDmChannelResponse);
  rpc ListDmChannels(ListDmChannelsRequest) returns (ListDmChannelsResponse);
  // AckMessage moves the last-read position forward for one channel.
  rpc AckMessage(AckMessageRequest) returns (AckMessageResponse);
  // GetReadStates reconciles read state for one Guild or all DMs.
  rpc GetReadStates(GetReadStatesRequest) returns (GetReadStatesResponse);
}

// ChannelReadState is one user's read position relative to a channel head.
message ChannelReadState {
  int64 channel_id = 1;
  int64 last_message_id = 2;
  int64 last_read_message_id = 3;
  int32 mention_count = 4;
}

// DmChannel is a private 1:1 conversation from the caller's perspective.
// All timestamps are Unix time in milliseconds.
message DmChannel {
  int64 id = 1;
  // The other participant.
  int64 recipient_id = 2;
  int64 created_at = 3;
}

// MessageType identifies the semantic kind of a message.
enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_DEFAULT = 1;
  MESSAGE_TYPE_REPLY = 19;
  // Reserved for messages created automatically when a thread is created.
  MESSAGE_TYPE_THREAD_STARTER = 21;
}

// MessageFlag contains bit values combined in Message.flags.
enum MessageFlag {
  MESSAGE_FLAG_UNSPECIFIED = 0;
  // The message has an associated thread whose ID equals the message ID.
  MESSAGE_FLAG_HAS_THREAD = 32;
  // Suppress push and desktop notifications for this message.
  MESSAGE_FLAG_SUPPRESS_NOTIFICATIONS = 4096;
}

// Message represents one message in a channel or thread.
// All timestamps are Unix time in milliseconds.
message Message {
  int64 id = 1;
  int64 channel_id = 2;
  // Public profile of the user who sent this message.
  UserProfile author = 3;
  string content = 4;
  MessageType type = 5;
  // Bitmask of MessageFlag values.
  int32 flags = 6;

  // Set when this message references another message.
  int64 referenced_message_id = 7;
  int64 referenced_channel_id = 8;

  repeated Attachment attachments = 9;

  // Non-zero after the message has been edited.
  int64 edited_at = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
  // Monotonically increasing version used to discard stale events.
  int64 revision = 13;
}

// Attachment describes a file uploaded before the message is created.
message Attachment {
  // Stable Media asset ID. The asset must already be READY and belong to the
  // message channel and bearer token user when submitted on a write request.
  int64 asset_id = 1;
  // Original filename displayed to users; it is not part of the object key.
  string filename = 2;
  // Trusted size in bytes returned by Message. Values supplied on message
  // writes are ignored and replaced from Media metadata.
  int64 size = 3;
  // Trusted canonical media type returned by Message. Values supplied on
  // message writes are ignored and replaced from Media metadata.
  string content_type = 4;
  // Trusted image dimensions; zero for files without dimensions. Values
  // supplied on message writes are ignored and replaced from Media metadata.
  int32 width = 5;
  int32 height = 6;
}

// CreateAttachmentUploadRequest declares the target channel and exact object
// the client will upload.
message CreateAttachmentUploadRequest {
  int64 channel_id = 1;
  // Exact Content-Length in bytes for the subsequent PUT.
  int64 expected_size = 2;
  // Canonical media type sent unchanged as the PUT Content-Type.
  string content_type = 3;
}

// CreateAttachmentUploadResponse contains a one-shot direct-upload contract.
message CreateAttachmentUploadResponse {
  // Opaque upload identifier used by completion or abort. After completion the
  // same numeric value is used as Attachment.asset_id.
  int64 upload_id = 1;
  // Short-lived URL accepting one PUT with the declared length and media type.
  string presigned_url = 2;
  // Upload session expiration as Unix milliseconds.
  int64 expires_at = 3;
}

// CompleteAttachmentUploadRequest selects an uploaded object and supplies its
// display filename.
message CompleteAttachmentUploadRequest {
  int64 channel_id = 1;
  // Opaque value returned by CreateAttachmentUpload.
  int64 upload_id = 2;
  // Original filename displayed to users; it does not affect object storage.
  string filename = 3;
}

// CompleteAttachmentUploadResponse contains trusted metadata suitable for a
// subsequent message write.
message CompleteAttachmentUploadResponse {
  Attachment attachment = 1;
}

// AbortAttachmentUploadRequest selects an unpublished upload to cancel.
message AbortAttachmentUploadRequest {
  int64 channel_id = 1;
  // Opaque value returned by CreateAttachmentUpload.
  int64 upload_id = 2;
}

// AbortAttachmentUploadResponse is empty because abort has no mutable result.
message AbortAttachmentUploadResponse {}

// GetAttachmentDownloadURLRequest identifies both the containing message and
// one of its persisted attachment assets.
message GetAttachmentDownloadURLRequest {
  int64 message_id = 1;
  int64 asset_id = 2;
}

// GetAttachmentDownloadURLResponse contains a transient URL that must not be
// persisted.
message GetAttachmentDownloadURLResponse {
  // Short-lived signed URL for the private attachment object.
  string url = 1;
  // URL expiration as Unix milliseconds.
  int64 expires_at = 2;
}

// AttachmentList distinguishes an omitted update from replacing attachments
// with an empty list.
message AttachmentList {
  repeated Attachment attachments = 1;
}

// MentionList distinguishes an omitted update from removing every mention.
message MentionList {
  repeated int64 user_ids = 1;
}

message CreateMessageRequest {
  int64 channel_id = 1;
  string content = 2;
  MessageType type = 3;
  // Initial client-settable MessageFlag values.
  int32 flags = 4;

  // Both reference fields must be set for a reply.
  int64 referenced_message_id = 5;
  int64 referenced_channel_id = 6;

  repeated Attachment attachments = 7;
  // User IDs parsed from mentions in content.
  repeated int64 mention_user_ids = 8;
}

message CreateMessageResponse {
  Message message = 1;
}

message UpdateMessageRequest {
  int64 message_id = 1;
  // When present, replaces the content; an explicit empty string clears it.
  string content = 2;
  // When present, replaces all client-settable flags.
  int32 flags = 3;
  // When present, replaces the complete attachment list.
  AttachmentList attachments = 4;
  // When present, replaces the complete mention list.
  MentionList mentions = 5;
}

message UpdateMessageResponse {
  Message message = 1;
}

message DeleteMessageRequest {
  int64 message_id = 1;
}

message DeleteMessageResponse {
  bool ok = 1;
}

message GetMessageRequest {
  int64 message_id = 1;
}

message GetMessageResponse {
  Message message = 1;
}

message ListMessagesRequest {
  int64 channel_id = 1;
  // before, after, and around are mutually exclusive.
  oneof cursor {
    int64 before = 2;
    int64 after = 3;
    int64 around = 4;
  }
  // Maximum results per page. The default is 50 and the maximum is 100.
  int32 limit = 5;
}

message ListMessagesResponse {
  repeated Message messages = 1;
  // Smallest message ID in this page, or zero when the page is empty.
  int64 before_cursor = 2;
  // Largest message ID in this page, or zero when the page is empty.
  int64 after_cursor = 3;
}

message CreateDmChannelRequest {
  int64 target_id = 1;
}

message CreateDmChannelResponse {
  DmChannel channel = 1;
}

message ListDmChannelsRequest {
  // Return channels with IDs smaller than this cursor.
  int64 before_id = 1;
  int32 limit = 2;
}

message ListDmChannelsResponse {
  repeated DmChannel channels = 1;
  int64 before_id = 2;
}

message AckMessageRequest {
  int64 channel_id = 1;
  // Only a larger ID moves the cursor forward.
  int64 message_id = 2;
}

message AckMessageResponse {
  ChannelReadState read_state = 1;
}

enum ReadStateScopeType {
  READ_STATE_SCOPE_TYPE_UNSPECIFIED = 0;
  READ_STATE_SCOPE_TYPE_GUILD = 1;
  READ_STATE_SCOPE_TYPE_ALL_DMS = 2;
}

message GetReadStatesRequest {
  ReadStateScopeType scope = 1;
  // Required only for READ_STATE_SCOPE_TYPE_GUILD.
  int64 guild_id = 2;
}

message GetReadStatesResponse {
  repeated DmChannel dm_channels = 1;
  repeated ChannelReadState read_states = 2;
}
