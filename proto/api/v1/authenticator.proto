edition = "2023";

package api.v1;

// AuthenticatorService manages public authentication and session lifecycle operations.
service AuthenticatorService {
  // Register creates an unverified account and sends an email verification link.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Login verifies credentials and returns either a new authenticated session or a two-factor challenge.
  rpc Login(LoginRequest) returns (LoginResponse);
  // CompleteTwoFactorLogin verifies a pending login with a TOTP or recovery code.
  rpc CompleteTwoFactorLogin(CompleteTwoFactorLoginRequest) returns (CompleteTwoFactorLoginResponse);
  // Refresh rotates the refresh token and issues a new access token.
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  // Logout revokes the session identified by the refresh token.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // RequestPasswordReset starts the email-based recovery flow. It always
  // reports success to avoid account enumeration.
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  // ConfirmPasswordReset sets a new password with a valid reset token and
  // signs the user out everywhere.
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);
  // RequestEmailVerification emails a verification link for the bearer
  // token owner's current email address.
  rpc RequestEmailVerification(RequestEmailVerificationRequest) returns (RequestEmailVerificationResponse);
  // ConfirmEmailVerification marks the email confirmed with a valid token.
  rpc ConfirmEmailVerification(ConfirmEmailVerificationRequest) returns (ConfirmEmailVerificationResponse);
  // ListSessions returns the bearer token owner's active sessions.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // RevokeSession revokes one session owned by the bearer token owner.
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc GetTwoFactorStatus(GetTwoFactorStatusRequest) returns (GetTwoFactorStatusResponse);
  rpc BeginTwoFactorEnrollment(BeginTwoFactorEnrollmentRequest) returns (BeginTwoFactorEnrollmentResponse);
  rpc ConfirmTwoFactorEnrollment(ConfirmTwoFactorEnrollmentRequest) returns (ConfirmTwoFactorEnrollmentResponse);
  rpc DisableTwoFactor(DisableTwoFactorRequest) returns (DisableTwoFactorResponse);
  rpc RegenerateTwoFactorRecoveryCodes(RegenerateTwoFactorRecoveryCodesRequest) returns (RegenerateTwoFactorRecoveryCodesResponse);
}

// AuthenticationResult contains the tokens and expiration times for an authenticated session.
// All expiration timestamps are Unix time in milliseconds.
message AuthenticationResult {
  bool ok = 1;
  int64 user_id = 2;
  int64 session_id = 3;
  string access_token = 4;
  int64 access_token_expires_at = 5;
  string refresh_token = 6;
  int64 refresh_token_expires_at = 7;
  int64 session_expires_at = 8;
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  // Globally unique handle; lowercase letters, digits, and underscores.
  string username = 4;
  // One-time authorization to create an account when registration is invite-only.
  string registration_invite_code = 5;
}

message RegisterResponse {
  bool ok = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  oneof outcome {
    AuthenticationResult result = 1;
    TwoFactorLoginChallenge two_factor_challenge = 2;
  }
}

message TwoFactorLoginChallenge {
  string token = 1;
  int64 expires_at = 2;
}

message CompleteTwoFactorLoginRequest {
  string challenge_token = 1;
  string code = 2;
}

message CompleteTwoFactorLoginResponse {
  AuthenticationResult result = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  AuthenticationResult result = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool ok = 1;
}

// Session contains client-visible metadata for an active authenticated session.
// All timestamps are Unix time in milliseconds.
message Session {
  int64 session_id = 1;
  string user_agent = 2;
  string ip = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int64 expires_at = 6;
  bool current = 7;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  int64 session_id = 1;
}

message RevokeSessionResponse {
  bool ok = 1;
}

message GetTwoFactorStatusRequest {}

message GetTwoFactorStatusResponse {
  bool enabled = 1;
  int32 recovery_codes_remaining = 2;
}

message BeginTwoFactorEnrollmentRequest {
  string password = 1;
}

message BeginTwoFactorEnrollmentResponse {
  string enrollment_token = 1;
  string otpauth_uri = 2;
  string manual_entry_key = 3;
  int64 expires_at = 4;
}

message ConfirmTwoFactorEnrollmentRequest {
  string enrollment_token = 1;
  string code = 2;
}

message ConfirmTwoFactorEnrollmentResponse {
  repeated string recovery_codes = 1;
}

message DisableTwoFactorRequest {
  string password = 1;
  oneof verification {
    string code = 2;
    string recovery_code = 3;
  }
}

message DisableTwoFactorResponse {
  bool ok = 1;
}

message RegenerateTwoFactorRecoveryCodesRequest {
  string password = 1;
  string code = 2;
}

message RegenerateTwoFactorRecoveryCodesResponse {
  repeated string recovery_codes = 1;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  bool ok = 1;
}

message ConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message ConfirmPasswordResetResponse {
  bool ok = 1;
}

message RequestEmailVerificationRequest {
  string email = 1;
}

message RequestEmailVerificationResponse {
  bool ok = 1;
}

message ConfirmEmailVerificationRequest {
  string token = 1;
}

message ConfirmEmailVerificationResponse {
  bool ok = 1;
}
