edition = "2023";

package presence.v1;

// PresenceService tracks realtime gateway liveness and channel routing.
// It does not own channel permissions or websocket connections; gateways
// validate subscriptions locally and publish only aggregate routes here.
service PresenceService {
  // RegisterGateway records the current process generation and direct gRPC
  // address for a gateway instance. Gateways call this on startup and as a
  // heartbeat.
  rpc RegisterGateway(RegisterGatewayRequest) returns (RegisterGatewayResponse);

  // RefreshChannelRoutes renews the gateway route for every listed channel.
  // Gateways call this when the first local subscriber appears and then
  // periodically while local subscribers remain.
  rpc RefreshChannelRoutes(RefreshChannelRoutesRequest) returns (RefreshChannelRoutesResponse);

  // DetachChannelRoute removes a channel route when a gateway no longer has
  // local subscribers for that channel.
  rpc DetachChannelRoute(DetachChannelRouteRequest) returns (DetachChannelRouteResponse);

  // ResolveChannelGateways returns live gateway instances that currently
  // carry sessions interested in a channel.
  rpc ResolveChannelGateways(ResolveChannelGatewaysRequest) returns (ResolveChannelGatewaysResponse);
}

message GatewayInstance {
  string gateway_id = 1;
  string generation = 2;
  string rpc_addr = 3;
  int64 expires_at = 4;
}

message RegisterGatewayRequest {
  string gateway_id = 1;
  string generation = 2;
  string rpc_addr = 3;
}

message RegisterGatewayResponse {
  GatewayInstance gateway = 1;
}

message RefreshChannelRoutesRequest {
  string gateway_id = 1;
  string generation = 2;
  repeated int64 channel_ids = 3;
}

message RefreshChannelRoutesResponse {
  int32 refreshed = 1;
}

message DetachChannelRouteRequest {
  string gateway_id = 1;
  string generation = 2;
  int64 channel_id = 3;
}

message DetachChannelRouteResponse {
  bool ok = 1;
}

message ResolveChannelGatewaysRequest {
  int64 channel_id = 1;
}

message ResolveChannelGatewaysResponse {
  repeated GatewayInstance gateways = 1;
}
